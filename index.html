<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我們的回憶錄</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Floating decorations -->
  <div class="particles" id="particles"></div>

  <!-- Table of Contents Sidebar -->
  <div class="toc-overlay" id="toc-overlay"></div>
  <nav class="toc" id="toc">
    <div class="toc-header">
      <h2>目錄</h2>
      <button class="toc-close" id="toc-close">&times;</button>
    </div>
    <div class="toc-search">
      <input type="text" id="toc-search" placeholder="搜尋回憶...">
    </div>
    <div class="toc-list" id="toc-list"></div>
  </nav>

  <!-- Main Book Area -->
  <div class="book-scene">
    <!-- TOC Toggle -->
    <button class="toc-toggle" id="toc-toggle">
      <span class="toc-icon">&#9776;</span>
      <span class="toc-label">目錄</span>
    </button>

    <div class="book" id="book">
      <!-- Cover -->
      <div class="page cover" id="cover">
        <div class="cover-front">
          <div class="cover-deco-top">&#10047; &#10047; &#10047;</div>
          <div class="cover-frame">
            <h1 class="cover-title">我們的<br>回憶錄</h1>
            <div class="cover-line"></div>
            <p class="cover-subtitle">從那天開始的每一天</p>
            <div class="cover-stats" id="cover-stats"></div>
          </div>
          <div class="cover-deco-bottom">
            <span>&#10084;</span>
          </div>
          <div class="confetti-container" id="confetti"></div>
        </div>
      </div>

      <div id="pages-container"></div>

      <!-- Back Cover -->
      <div class="page back-cover">
        <div class="back-content">
          <div class="back-deco">&#10047;</div>
          <p class="back-text">未完待續...</p>
          <p class="back-sub">每一天都是新的回憶</p>
          <div class="back-stats" id="back-stats"></div>
          <div class="back-hearts">
            <span>&#10084;</span><span>&#10084;</span><span>&#10084;</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <div class="nav-bar">
    <button class="nav-btn" id="prev-btn" aria-label="上一頁">&#10094;</button>
    <div class="page-progress">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="page-indicator" id="page-indicator">1 / 1</div>
    <button class="nav-btn" id="next-btn" aria-label="下一頁">&#10095;</button>
  </div>

  <div class="hint" id="hint">點擊書本右側 或 按 &#8594; 翻頁 &#183; 點 ☰ 開啟目錄</div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close">&times;</button>
    <div class="lightbox-content">
      <img id="lightbox-img" src="" alt="">
      <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
