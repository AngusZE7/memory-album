<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我們的回憶錄</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="book-scene">
    <div class="book" id="book">
      <!-- Cover -->
      <div class="page cover" id="cover">
        <div class="cover-front">
          <div class="cover-deco"></div>
          <h1 class="cover-title">我們的回憶錄</h1>
          <p class="cover-subtitle">從那天開始的每一天</p>
          <div class="cover-stats" id="cover-stats"></div>
          <div class="cover-flower">&#10047;</div>
        </div>
      </div>

      <!-- Pages will be generated by JS -->
      <div id="pages-container"></div>

      <!-- Back Cover -->
      <div class="page back-cover">
        <div class="back-content">
          <p class="back-text">未完待續...</p>
          <p class="back-date" id="back-date"></p>
          <div class="back-heart">&#10084;</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <div class="nav-controls">
    <button class="nav-btn prev-btn" id="prev-btn" aria-label="上一頁">&#10094;</button>
    <div class="page-indicator" id="page-indicator">1 / 1</div>
    <button class="nav-btn next-btn" id="next-btn" aria-label="下一頁">&#10095;</button>
  </div>

  <div class="hint" id="hint">點擊右側或按 → 翻頁</div>

  <script src="script.js"></script>
</body>
</html>
